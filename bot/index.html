<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация YouGile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            margin: 0; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 14px; font-weight: bold; color: var(--tg-theme-hint-color, #999); }
        input {
            padding: 12px; border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px; background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000); font-size: 16px;
        }
        button {
            margin-top: 10px; padding: 15px; border: none; border-radius: 8px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <h3>🔑 Вход в YouGile</h3>
    <div class="form-group">
        <label>Email (Логин)</label>
        <input type="email" id="login" placeholder="example@gmail.com">
    </div>
    <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <button id="submit_btn">Войти и выбрать компанию</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // Инициализация окна в ТГ
        tg.expand(); // Раскрыть на максимум

        document.getElementById('submit_btn').addEventListener('click', () => {
            const login = document.getElementById('login').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!login || !pass) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }

            // Безопасно упаковываем данные в строку для отправки боту
            const dataStr = JSON.stringify({ login: login, password: pass });
            
            // Метод отправляет данные боту и автоматически закрывает окно
            tg.sendData(dataStr);
        });
    </script>
</body>
</html>
